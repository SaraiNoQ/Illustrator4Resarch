interface:
  display_name: "Scientific Figure Making"
  short_description: "Generate publication-ready Matplotlib scientific figures with automatic palette and chart-style selection."
  brand_color: "#0F4D92"
  default_prompt: "Use this skill to create a paper-ready scientific figure. Provide figure type, data, target chart style, palette preference, semantic roles, and output paths."

policy:
  allow_implicit_invocation: true

metadata:
  version: "0.5.0"
  install_scope: "repo,user,admin"
  standalone: true
  design_layers:
    - palette
    - chart_style

dependencies:
  python: ">=3.9"
  packages:
    - matplotlib
    - numpy
